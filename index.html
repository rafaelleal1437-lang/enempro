<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ENEMPro — Estude. Evolua. Passe.</title>
  <meta name="description" content="A plataforma de estudos gamificada para o ENEM. Questões, simulados, estratégias e muito mais."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Montserrat:wght@700;800;900&display=swap"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{min-height:100vh;background:#F7F9F7}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-thumb{background:#C8DEC8;border-radius:3px}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes xpUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-40px)}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// ── TEMA ────────────────────────────────────────────────────────
const C = {
  // Fundos
  bg:"#F7F9F7", white:"#FFFFFF", bgDark:"#1A2E1A",
  // Verdes naturais
  g900:"#14401A", g800:"#1A5C22", g700:"#1E7A2C",
  g600:"#2A9A3A", g500:"#3AB54A", g400:"#5ECC6C",
  g100:"#E8F5E9", g50:"#F0FAF0",
  // Neutros
  n900:"#1C2B1C", n700:"#3D4F3D", n500:"#6B7F6B",
  n300:"#A8BAA8", n100:"#E4EDE4", n50:"#F2F7F2",
  // Acento
  amber:"#D97706", amberL:"#FEF3C7",
  rose:"#DC2626", roseL:"#FEE2E2",
  sky:"#0369A1", skyL:"#E0F2FE",
};
const ff = "'Outfit',sans-serif";
const fd = "'Montserrat',sans-serif";

const CREDITS_START = 10000;
const CREDIT_COST = 2500;

function getLevel(xp){
  const t=[0,100,300,600,1000,1500,2100,2800,3700,5000];
  let lv=0;
  for(let i=0;i<t.length;i++) if(xp>=t[i]) lv=i+1;
  const cur=t[lv-1]||0, nxt=t[lv]||cur+1500;
  return{level:lv,pct:Math.round(((xp-cur)/(nxt-cur))*100),nextXp:nxt};
}

// ── DADOS ────────────────────────────────────────────────────────
const QUESTIONS=[
  {id:1,area:"Matemática",year:2023,q:"Uma empresa precisa transportar 34 toneladas usando caminhões de 4 toneladas. Qual o número mínimo de caminhões?",opts:["7","8","9","10"],ans:2,xp:15,exp:"34 ÷ 4 = 8,5. Arredonda para cima: 9 caminhões."},
  {id:2,area:"Português",year:2022,q:"Saussure compara a língua a outros sistemas de signos. Isso define língua como:",opts:["Código exclusivo da fala","Sistema biológico","Signos articulados vocalmente","Sistema de signos entre outros sistemas"],ans:3,xp:15,exp:"Saussure define língua como um sistema entre outros sistemas de signos."},
  {id:3,area:"Biologia",year:2023,q:"Após uso de antibióticos, bactérias resistentes sobrevivem. Qual processo evolutivo explica isso?",opts:["Mutação induzida","Seleção natural de variantes pré-existentes","Adaptação fenotípica","Herança de caracteres adquiridos"],ans:1,xp:15,exp:"Seleção natural: bactérias já resistentes sobrevivem e se reproduzem."},
  {id:4,area:"História",year:2022,q:"O Renascimento rompeu com o pensamento medieval principalmente por:",opts:["Valorizar a fé acima da razão","Retomar valores greco-romanos e o antropocentrismo","Defender a Igreja nas artes","Propor retorno ao feudalismo"],ans:1,xp:15,exp:"O Humanismo colocou o ser humano no centro, em oposição ao teocentrismo medieval."},
  {id:5,area:"Química",year:2023,q:"2NaHCO₃→Na₂CO₃+H₂O+CO₂. Com 16,8g de NaHCO₃ (M=84), qual volume de CO₂ a 0°C/1atm?",opts:["1,12 L","2,24 L","4,48 L","6,72 L"],ans:1,xp:20,exp:"0,2 mol NaHCO₃ → 0,1 mol CO₂ → 0,1×22,4 = 2,24 L."},
  {id:6,area:"Geografia",year:2022,q:"Regiões metropolitanas brasileiras caracterizam-se por:",opts:["Distribuição equilibrada de renda","Integração funcional ao redor de uma metrópole","Redução dos fluxos migratórios","Descentralização industrial"],ans:1,xp:15,exp:"Integração funcional de municípios ao redor de uma cidade polo."},
];

const PLANS=[
  {id:"basico",label:"Básico",price:39,period:"/mês",credits:"Ilimitado",color:C.g600,cta:"Assinar Básico",
   items:["Créditos ilimitados","2 simulados/mês","Sem anúncios","Correção por IA","Missões premium"]},
  {id:"premium",label:"Premium",price:59,period:"/mês",credits:"Ilimitado",color:C.g700,cta:"Assinar Premium",hi:true,
   items:["Tudo do Básico","Simulados ilimitados","Redação com professor","Mentoria semanal","Suporte 24h","Grupo WhatsApp"]},
  {id:"vitalicio",label:"Vitalício",price:297,period:" único",credits:"Ilimitado",color:C.amber,cta:"Garantir Acesso",
   items:["Acesso permanente","Tudo do Premium","ENEMs futuros incluídos","Suporte VIP"]},
];

const RANKING=[
  {pos:1,name:"Ana Carolina",xp:4820,streak:45},
  {pos:2,name:"Pedro Henrique",xp:4650,streak:38},
  {pos:3,name:"Mariana Silva",xp:4430,streak:31},
  {pos:4,name:"Lucas Ferreira",xp:3980,streak:27},
  {pos:5,name:"Julia Santos",xp:3750,streak:22},
  {pos:6,name:"Você",xp:2340,streak:7,isUser:true},
  {pos:7,name:"Carlos Lima",xp:2100,streak:5},
  {pos:8,name:"Fernanda Costa",xp:1980,streak:3},
];

// ── APP ──────────────────────────────────────────────────────────
function App(){
  const [page,setPage]=useState("landing");
  const [authModal,setAuthModal]=useState(null);
  const [user,setUser]=useState(null);
  const [plan,setPlan]=useState(null);
  const [spinModal,setSpinModal]=useState(false);
  const [creditModal,setCreditModal]=useState(false);
  const [xpPop,setXpPop]=useState(null);
  const [days,setDays]=useState(166);

  useEffect(()=>{
    setDays(Math.max(0,Math.ceil((new Date("2026-11-08")-new Date())/86400000)));
  },[]);

  const go=(p)=>{setPage(p);window.scrollTo(0,0);};
  const login=(name,email)=>{
    setUser({name,email,plan:"free",xp:2340,coins:85,streak:7,credits:CREDITS_START});
    setAuthModal(null);go("dashboard");
  };
  const logout=()=>{setUser(null);go("landing");};
  const openCheckout=(p)=>{setPlan(p);go("checkout");};

  const spendCredits=(cost)=>{
    if(!user) return false;
    if(user.credits<cost){ setCreditModal(true); return false; }
    setUser(u=>({...u,credits:u.credits-cost}));
    return true;
  };
  const addXP=(v)=>{
    if(!user)return;
    setUser(u=>({...u,xp:u.xp+v}));
    setXpPop(`+${v} XP`);
    setTimeout(()=>setXpPop(null),1800);
  };
  const addCoins=(v)=>{ if(user) setUser(u=>({...u,coins:u.coins+v})); };

  const lv=user?getLevel(user.xp):{level:1,pct:0,nextXp:100};

  return(
    <div style={{background:C.bg,color:C.n900,fontFamily:ff,minHeight:"100vh"}}>
      <style>{`
        .btn-green{background:${C.g700};color:#fff;border:none;border-radius:8px;padding:12px 24px;font-family:${ff};font-weight:700;font-size:15px;cursor:pointer;transition:all .2s}
        .btn-green:hover{background:${C.g800};transform:translateY(-1px);box-shadow:0 4px 16px rgba(30,122,44,.25)}
        .btn-outline{background:transparent;color:${C.g700};border:1.5px solid ${C.g400};border-radius:8px;padding:11px 22px;font-family:${ff};font-weight:600;font-size:14px;cursor:pointer;transition:all .2s}
        .btn-outline:hover{background:${C.g50};transform:translateY(-1px)}
        .card{background:#fff;border:1px solid ${C.n100};border-radius:16px;transition:all .2s}
        .card:hover{box-shadow:0 8px 32px rgba(26,92,34,.08)}
        input:focus{outline:none;border-color:${C.g500}!important;box-shadow:0 0 0 3px rgba(58,181,74,.12)}
      `}</style>

      {xpPop&&<div style={{position:"fixed",top:76,right:20,background:C.g700,color:"#fff",padding:"6px 16px",borderRadius:100,fontWeight:700,fontSize:13,zIndex:500,animation:"xpUp 1.8s ease forwards",boxShadow:"0 4px 12px rgba(30,122,44,.3)"}}>{xpPop}</div>}

      <Nav user={user} page={page} go={go} onLogin={()=>setAuthModal("login")} onRegister={()=>setAuthModal("register")} onLogout={logout} lv={lv} openSpin={()=>setSpinModal(true)}/>

      <div style={{animation:"fadeIn .3s ease"}} key={page}>
        {page==="landing"    && <Landing days={days} go={go} setModal={setAuthModal} openCheckout={openCheckout}/>}
        {page==="exercises"  && <Exercises user={user} setModal={setAuthModal} addXP={addXP} addCoins={addCoins} spendCredits={spendCredits} openCheckout={openCheckout}/>}
        {page==="strategies" && <Strategies/>}
        {page==="ranking"    && <Ranking/>}
        {page==="dashboard"  && user && <Dashboard user={user} go={go} openCheckout={openCheckout} lv={lv} openSpin={()=>setSpinModal(true)}/>}
        {page==="checkout"   && <Checkout plan={plan} go={go}/>}
      </div>

      {authModal&&<AuthModal mode={authModal} onClose={()=>setAuthModal(null)} onSwitch={m=>setAuthModal(m)} onSuccess={login}/>}
      {spinModal&&<SpinModal onClose={()=>setSpinModal(false)} addXP={addXP} addCoins={addCoins}/>}
      {creditModal&&<CreditModal onClose={()=>setCreditModal(false)} openCheckout={openCheckout} setCreditModal={setCreditModal}/>}
    </div>
  );
}

// ── NAV ──────────────────────────────────────────────────────────
function Nav({user,page,go,onLogin,onRegister,onLogout,lv,openSpin}){
  return(
    <nav style={{position:"sticky",top:0,zIndex:100,background:"rgba(247,249,247,.97)",backdropFilter:"blur(20px)",borderBottom:`1px solid ${C.n100}`,height:62,display:"flex",alignItems:"center",padding:"0 28px",justifyContent:"space-between",boxShadow:"0 1px 0 rgba(0,0,0,.05)"}}>
      {/* LOGO — clicável volta ao início */}
      <div onClick={()=>go("landing")} style={{cursor:"pointer",display:"flex",alignItems:"center",gap:10,userSelect:"none"}}>
        <div style={{width:36,height:36,background:`linear-gradient(135deg,${C.g700},${C.g500})`,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 12px rgba(30,122,44,.25)`}}>
          <span style={{fontFamily:fd,fontSize:20,color:"#fff",fontWeight:900,lineHeight:1}}>E</span>
        </div>
        <div>
          <span style={{fontFamily:fd,fontSize:18,color:C.g800,fontWeight:900,letterSpacing:.5}}>ENEM</span>
          <span style={{fontFamily:fd,fontSize:18,color:C.g500,fontWeight:700}}>Pro</span>
        </div>
      </div>

      <div style={{display:"flex",gap:4}}>
        {[["exercises","Exercícios"],["strategies","Estratégias"],["ranking","Ranking"]].map(([p,l])=>(
          <button key={p} onClick={()=>go(p)} style={{background:page===p?C.g50:"transparent",border:"none",color:page===p?C.g700:C.n500,padding:"6px 14px",borderRadius:8,cursor:"pointer",fontFamily:ff,fontWeight:600,fontSize:13,borderBottom:page===p?`2px solid ${C.g600}`:"2px solid transparent",transition:"all .15s"}}>
            {l}
          </button>
        ))}
        {user&&<button onClick={()=>go("dashboard")} style={{background:page==="dashboard"?C.g50:"transparent",border:"none",color:page==="dashboard"?C.g700:C.n500,padding:"6px 14px",borderRadius:8,cursor:"pointer",fontFamily:ff,fontWeight:600,fontSize:13,borderBottom:page==="dashboard"?`2px solid ${C.g600}`:"2px solid transparent"}}>Dashboard</button>}
      </div>

      <div style={{display:"flex",alignItems:"center",gap:10}}>
        {user?(
          <>
            <div style={{display:"flex",gap:10,alignItems:"center",background:C.g50,border:`1px solid ${C.n100}`,borderRadius:100,padding:"5px 14px",fontSize:12,fontWeight:700}}>
              <span style={{color:C.rose}}>🔥 {user.streak}d</span>
              <span style={{color:C.n300}}>|</span>
              <span style={{color:C.g700}}>{user.xp.toLocaleString()} XP</span>
              <span style={{color:C.n300}}>|</span>
              <span style={{color:C.amber}}>◎ {user.coins}</span>
              <span style={{color:C.n300}}>|</span>
              <span style={{color:user.credits<2500?C.rose:C.g700}}>⚡ {user.credits.toLocaleString()}</span>
            </div>
            <button onClick={openSpin} className="btn-outline" style={{padding:"5px 12px",fontSize:12}}>Girar 🎰</button>
            <div onClick={onLogout} title="Sair" style={{width:32,height:32,borderRadius:8,background:`linear-gradient(135deg,${C.g600},${C.g800})`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:"#fff",cursor:"pointer",fontSize:13}}>
              {user.name[0].toUpperCase()}
            </div>
          </>
        ):(
          <>
            <button onClick={onLogin} className="btn-outline" style={{padding:"7px 18px"}}>Entrar</button>
            <button onClick={onRegister} className="btn-green" style={{padding:"7px 18px"}}>Começar grátis</button>
          </>
        )}
      </div>
    </nav>
  );
}

// ── LANDING ───────────────────────────────────────────────────────
function Landing({days,go,setModal,openCheckout}){
  const [count,setCount]=useState({d:0,h:0,m:0,s:0});
  useEffect(()=>{
    const t=setInterval(()=>{
      const d=new Date("2026-11-08T08:00:00")-new Date();
      if(d>0) setCount({d:Math.floor(d/86400000),h:Math.floor((d%86400000)/3600000),m:Math.floor((d%3600000)/60000),s:Math.floor((d%60000)/1000)});
    },1000);
    return()=>clearInterval(t);
  },[]);

  return(
    <div>
      {/* HERO */}
      <section style={{background:`linear-gradient(160deg,${C.g900} 0%,${C.g800} 60%,${C.g700} 100%)`,padding:"80px 28px 72px",position:"relative",overflow:"hidden"}}>
        {/* Decorative circles */}
        <div style={{position:"absolute",top:-80,right:-80,width:400,height:400,borderRadius:"50%",background:"rgba(255,255,255,.03)",pointerEvents:"none"}}/>
        <div style={{position:"absolute",bottom:-60,left:-60,width:280,height:280,borderRadius:"50%",background:"rgba(255,255,255,.02)",pointerEvents:"none"}}/>

        <div style={{maxWidth:1080,margin:"0 auto",display:"grid",gridTemplateColumns:"1fr 1fr",gap:60,alignItems:"center",position:"relative",zIndex:1}}>
          <div>
            <div style={{display:"inline-flex",alignItems:"center",gap:8,background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.15)",borderRadius:100,padding:"5px 16px",marginBottom:24}}>
              <span style={{width:7,height:7,borderRadius:"50%",background:"#86EFAC",display:"inline-block",animation:"pulse 1.5s infinite"}}/>
              <span style={{color:"rgba(255,255,255,.85)",fontSize:12,fontWeight:600}}>Plataforma de aprovação ENEM 2026</span>
            </div>
            <h1 style={{fontFamily:fd,fontSize:64,lineHeight:1.05,color:"#fff",marginBottom:20,fontWeight:900}}>
              Estude mais.<br/>Evolua sempre.<br/><span style={{color:"#86EFAC"}}>Passe no ENEM.</span>
            </h1>
            <p style={{color:"rgba(255,255,255,.7)",fontSize:16,lineHeight:1.8,marginBottom:28,maxWidth:420,fontWeight:300}}>
              Exercícios reais, sistema de progresso gamificado e estratégias comprovadas. Tudo que você precisa em um só lugar.
            </p>

            {/* Countdown */}
            <div style={{display:"flex",gap:8,marginBottom:32,alignItems:"flex-end"}}>
              {[{v:count.d,l:"dias"},{v:count.h,l:"horas"},{v:count.m,l:"min"},{v:count.s,l:"seg"}].map(({v,l},i)=>(
                <div key={l} style={{textAlign:"center"}}>
                  <div style={{background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.15)",borderRadius:10,padding:"10px 14px",minWidth:62,backdropFilter:"blur(8px)"}}>
                    <span style={{fontFamily:fd,fontSize:30,color:i===0?"#FCA5A5":"#fff",lineHeight:1,fontWeight:900}}>{String(v).padStart(2,"0")}</span>
                  </div>
                  <p style={{color:"rgba(255,255,255,.5)",fontSize:10,marginTop:5,letterSpacing:1,textTransform:"uppercase"}}>{l}</p>
                </div>
              ))}
            </div>

            <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
              <button onClick={()=>setModal("register")} style={{background:"#fff",border:"none",color:C.g800,padding:"14px 28px",borderRadius:8,cursor:"pointer",fontFamily:ff,fontWeight:800,fontSize:15,boxShadow:"0 4px 20px rgba(0,0,0,.2)",transition:"all .2s"}}>
                Começar agora — é grátis
              </button>
              <button onClick={()=>go("exercises")} style={{background:"transparent",border:"2px solid rgba(255,255,255,.3)",color:"rgba(255,255,255,.9)",padding:"14px 22px",borderRadius:8,cursor:"pointer",fontFamily:ff,fontWeight:600,fontSize:14,transition:"all .2s"}}>
                Ver exercícios →
              </button>
            </div>

            <div style={{display:"flex",gap:20,marginTop:24,flexWrap:"wrap"}}>
              {["✓ Garantia de 7 dias","✓ 12.000+ aprovados","✓ 4.9★ de avaliação"].map(t=>(
                <span key={t} style={{color:"rgba(255,255,255,.55)",fontSize:12,fontWeight:500}}>{t}</span>
              ))}
            </div>
          </div>

          {/* Card preview */}
          <div style={{background:"#fff",borderRadius:20,padding:24,boxShadow:"0 24px 64px rgba(0,0,0,.2)"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18,paddingBottom:16,borderBottom:`1px solid ${C.n100}`}}>
              <div style={{width:42,height:42,borderRadius:10,background:`linear-gradient(135deg,${C.g600},${C.g800})`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:fd,fontSize:18,color:"#fff",fontWeight:900}}>A</div>
              <div style={{flex:1}}>
                <p style={{fontWeight:700,fontSize:14,color:C.n900}}>Ana Carolina</p>
                <p style={{color:C.n500,fontSize:12}}>Nível 9 · 4.820 XP</p>
              </div>
              <span style={{fontSize:18}}>🏆</span>
            </div>

            <div style={{marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:12,color:C.n500,fontWeight:600}}>Progresso — Nível 9 → 10</span>
                <span style={{fontSize:12,fontWeight:700,color:C.g600}}>82%</span>
              </div>
              <div style={{height:8,background:C.n100,borderRadius:4,overflow:"hidden"}}>
                <div style={{height:"100%",width:"82%",background:`linear-gradient(90deg,${C.g600},${C.g400})`,borderRadius:4}}/>
              </div>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
              {[{l:"Streak",v:"45d",c:C.rose},{l:"XP Total",v:"4.820",c:C.g700},{l:"Créditos",v:"7.500",c:C.amber}].map(({l,v,c})=>(
                <div key={l} style={{background:C.g50,border:`1px solid ${C.n100}`,borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
                  <p style={{color:C.n500,fontSize:10,fontWeight:600,marginBottom:3}}>{l}</p>
                  <p style={{fontFamily:fd,fontSize:20,color:c,fontWeight:900}}>{v}</p>
                </div>
              ))}
            </div>

            <div style={{background:C.g50,border:`1px solid ${C.n100}`,borderRadius:10,padding:12}}>
              <p style={{color:C.n500,fontSize:10,fontWeight:700,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Missões de hoje</p>
              {[{t:"10 questões respondidas",xp:50,done:true},{t:"Sessão Pomodoro 25min",xp:40,done:false}].map((m,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:i===0?6:0}}>
                  <span style={{fontSize:12,color:m.done?C.g600:C.n700,textDecoration:m.done?"line-through":"none"}}>{m.t}</span>
                  <span style={{fontSize:11,color:C.amber,fontWeight:700}}>+{m.xp} XP</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </section>

      {/* STATS BAR */}
      <section style={{background:C.white,borderBottom:`1px solid ${C.n100}`,padding:"16px 28px"}}>
        <div style={{maxWidth:1080,margin:"0 auto",display:"flex",justifyContent:"center",gap:48,flexWrap:"wrap"}}>
          {[["12.000+","Aprovados"],["4.9★","Avaliação"],["5.000+","Questões"],["87%","Aprovação em federal"]].map(([n,l])=>(
            <div key={l} style={{textAlign:"center"}}>
              <p style={{fontFamily:fd,fontSize:24,color:C.g700,fontWeight:900,lineHeight:1}}>{n}</p>
              <p style={{color:C.n500,fontSize:11,marginTop:3,fontWeight:500}}>{l}</p>
            </div>
          ))}
        </div>
      </section>

      {/* CRÉDITOS */}
      <section style={{maxWidth:1080,margin:"0 auto",padding:"64px 28px"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:48,alignItems:"center"}}>
          <div>
            <span style={{background:C.g100,color:C.g700,fontSize:11,fontWeight:700,padding:"4px 12px",borderRadius:100,textTransform:"uppercase",letterSpacing:1}}>Sistema de créditos</span>
            <h2 style={{fontFamily:fd,fontSize:42,color:C.g900,marginTop:12,marginBottom:16,lineHeight:1.15}}>Estude no seu ritmo, com limites inteligentes</h2>
            <p style={{color:C.n500,fontSize:15,lineHeight:1.8,marginBottom:20,fontWeight:300}}>

  useEffect(()=>{
    if(pomOn){ ref.current=setInterval(()=>setPom(t=>{ if(t<=1){clearInterval(ref.current);setPomOn(false);addXP&&addXP(40);return 25*60;} return t-1;}),1000); }
    return()=>clearInterval(ref.current);
  },[pomOn]);

  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

  const handleAnswer=(i)=>{
    if(answered)return;
    if(!user){ setModal("register"); return; }
    const ok=spendCredits(CREDIT_COST);
    if(!ok)return;
    setSel(i);
    if(i===q.ans){ addXP(q.xp); addCoins(2); }
  };

  const next=()=>{ if(idx<QUESTIONS.length-1){setIdx(i=>i+1);setSel(null);} };
  const prev=()=>{ if(idx>0){setIdx(i=>i-1);setSel(null);} };

  return(
    <div style={{maxWidth:760,margin:"0 auto",padding:"32px 28px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div>
          <p style={{color:C.n500,fontSize:12,fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Banco de questões</p>
          <h1 style={{fontFamily:fd,fontSize:36,color:C.g900,fontWeight:900}}>{idx+1} <span style={{color:C.n400,fontSize:24}}>/ {QUESTIONS.length}</span></h1>
          {user&&<p style={{color:user.credits<2500?C.rose:C.n500,fontSize:12,marginTop:4,fontWeight:500}}>⚡ {user.credits.toLocaleString()} créditos restantes · cada questão custa {CREDIT_COST.toLocaleString()}</p>}
        </div>
        {/* Pomodoro */}
        <div className="card" style={{padding:"12px 18px",display:"flex",alignItems:"center",gap:12,border:pomOn?`1.5px solid ${C.g500}`:`1px solid ${C.n100}`}}>
          <div>
            <p style={{color:C.n500,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:2}}>Pomodoro</p>
            <p style={{fontFamily:fd,fontSize:26,color:pomOn?C.g700:C.n700,lineHeight:1,fontWeight:900}}>{fmt(pom)}</p>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <button onClick={()=>setPomOn(a=>!a)} className="btn-green" style={{padding:"5px 12px",fontSize:11}}>
              {pomOn?"Pausar":"▶ Iniciar"}
            </button>
            <button onClick={()=>{setPomOn(false);setPom(25*60);}} className="btn-outline" style={{padding:"4px 10px",fontSize:11}}>Reset</button>
          </div>
        </div>
      </div>

      {/* Progress bar */}
      <div style={{height:4,background:C.n100,borderRadius:2,marginBottom:22,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${((idx+1)/QUESTIONS.length)*100}%`,background:`linear-gradient(90deg,${C.g600},${C.g400})`,borderRadius:2,transition:"width .4s"}}/>
      </div>

      <div className="card" style={{padding:26,marginBottom:14}}>
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          <span style={{background:C.g100,border:`1px solid ${C.n100}`,borderRadius:6,padding:"3px 12px",fontSize:11,fontWeight:700,color:C.g700}}>{q.area}</span>
          <span style={{background:C.n50,border:`1px solid ${C.n100}`,borderRadius:6,padding:"3px 12px",fontSize:11,color:C.n500}}>ENEM {q.year}</span>
          <span style={{background:C.amberL,border:`1px solid rgba(217,119,6,.2)`,borderRadius:6,padding:"3px 12px",fontSize:11,color:C.amber,fontWeight:700}}>+{q.xp} XP · {CREDIT_COST.toLocaleString()} créditos</span>
        </div>
        <p style={{fontSize:15,lineHeight:1.9,color:C.n900,marginBottom:22,fontWeight:400}}>{q.q}</p>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {q.opts.map((opt,i)=>{
            let bg=C.g50,bc=C.n100,col=C.n700,fw=400;
            if(answered){
              if(i===q.ans){bg="#F0FDF4";bc=C.g500;col=C.g700;fw=600;}
              else if(i===sel&&i!==q.ans){bg=C.roseL;bc=C.rose;col=C.rose;fw=600;}
              else{col=C.n400;}
            }
            return(
              <button key={i} onClick={()=>handleAnswer(i)} style={{background:bg,border:`1.5px solid ${bc}`,borderRadius:10,padding:"13px 16px",cursor:answered?"default":"pointer",color:col,fontFamily:ff,fontSize:14,textAlign:"left",transition:"all .2s",display:"flex",gap:12,alignItems:"center",fontWeight:fw}}>
                <span style={{width:26,height:26,borderRadius:6,background:answered&&i===q.ans?C.g600:answered&&i===sel&&i!==q.ans?C.rose:C.white,border:`1.5px solid ${answered&&i===q.ans?C.g600:answered&&i===sel&&i!==q.ans?C.rose:C.n200}`,color:answered&&(i===q.ans||(i===sel&&i!==q.ans))?"#fff":C.n400,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0}}>
                  {String.fromCharCode(65+i)}
                </span>
                {opt}
              </button>
            );
          })}
        </div>
      </div>

      {answered&&(
        <div style={{background:sel===q.ans?C.g50:C.roseL,border:`1.5px solid ${sel===q.ans?C.g500:C.rose}`,borderRadius:10,padding:16,marginBottom:14}}>
          <p style={{fontWeight:700,color:sel===q.ans?C.g700:C.rose,marginBottom:5,fontSize:13}}>{sel===q.ans?`✅ Correto! +${q.xp} XP`:"❌ Incorreto — veja a explicação:"}</p>
          <p style={{color:C.n700,fontSize:13,lineHeight:1.8,fontWeight:300}}>{q.exp}</p>
        </div>
      )}

      {!user&&(
        <div style={{background:C.g50,border:`1.5px solid ${C.g300}`,borderRadius:10,padding:"12px 18px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <p style={{color:C.g700,fontSize:13,fontWeight:600}}>Crie uma conta gratuita para responder questões e ganhar 10.000 créditos</p>
          <button onClick={()=>setModal("register")} className="btn-green" style={{padding:"7px 16px",fontSize:12}}>Criar conta →</button>
        </div>
      )}

      <div style={{display:"flex",justifyContent:"space-between"}}>
        <button onClick={prev} disabled={idx===0} className="btn-outline" style={{opacity:idx===0?.4:1,cursor:idx===0?"default":"pointer"}}>← Anterior</button>
        <button onClick={next} disabled={idx===QUESTIONS.length-1} className="btn-green" style={{opacity:idx===QUESTIONS.length-1?.4:1,cursor:idx===QUESTIONS.length-1?"default":"pointer"}}>Próxima →</button>
      </div>
    </div>
  );
}

// ── STRATEGIES ────────────────────────────────────────────────────
function Strategies(){
  const items=[
    {n:"01",tag:"Produtividade",title:"Pomodoro para ENEM",body:"Ciclos de 45min de foco + 15min de revisão ativa. O ENEM exige concentração prolongada. Use o timer integrado nos exercícios da plataforma."},
    {n:"02",tag:"Planejamento",title:"Priorize pelo peso",body:"Matemática + Linguagens = 40% das questões. Com menos de 120 dias, dedique 60% do tempo nessas áreas. Ciências Humanas é a mais rápida de recuperar."},
    {n:"03",tag:"Memorização",title:"Revisão espaçada",body:"Revise no dia seguinte → 3 dias → 7 → 21. Consolida memória de longo prazo. Use as missões semanais da plataforma para manter a cadência."},
    {n:"04",tag:"Redação",title:"Estrutura nota 1000",body:"Tese no 1º parágrafo. Cada desenvolvimento: argumento + evidência + conexão. Proposta: agente + ação + meio + finalidade + detalhamento. Obrigatório."},
    {n:"05",tag:"Prova",title:"Resolução estratégica",body:"Elimine 2 alternativas: chance vai de 20% para 33%. 'Sempre', 'nunca', 'todos' costumam ser pegadinhas. Máx. 3 min por questão."},
    {n:"06",tag:"Mental",title:"Controle da ansiedade",body:"8h de sono nas 3 noites anteriores vale mais que estudar na véspera. Respiração 4-7-8 antes da prova. Chegue 30 min antes."},
  ];
  return(
    <div style={{maxWidth:1080,margin:"0 auto",padding:"40px 28px"}}>
      <div style={{marginBottom:44}}>
        <span style={{background:C.g100,color:C.g700,fontSize:11,fontWeight:700,padding:"4px 12px",borderRadius:100,textTransform:"uppercase",letterSpacing:1}}>Métodos comprovados</span>
        <h1 style={{fontFamily:fd,fontSize:48,color:C.g900,marginTop:12,marginBottom:8,fontWeight:900}}>Estratégias que funcionam.</h1>
        <p style={{color:C.n500,fontSize:14,fontWeight:300}}>Validadas por quem tirou 900+ pontos no ENEM</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:16}}>
        {items.map(({n,tag,title,body})=>(
          <div key={n} className="card" style={{padding:26}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
              <span style={{fontFamily:fd,fontSize:13,color:C.g600,fontWeight:700,letterSpacing:1}}>{n}</span>
              <span style={{background:C.g50,border:`1px solid ${C.n100}`,borderRadius:100,padding:"2px 10px",fontSize:10,color:C.n500,fontWeight:600}}>{tag}</span>
            </div>
            <h3 style={{fontWeight:700,fontSize:17,marginBottom:10,color:C.n900}}>{title}</h3>
            <p style={{color:C.n500,fontSize:13,lineHeight:1.8,fontWeight:300}}>{body}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── RANKING ───────────────────────────────────────────────────────

  return(
    <div style={{maxWidth:640,margin:"0 auto",padding:"40px 28px"}}>
      <div style={{marginBottom:28}}>
        <span style={{background:C.g100,color:C.g700,fontSize:11,fontWeight:700,padding:"4px 12px",borderRadius:100,textTransform:"uppercase",letterSpacing:1}}>Esta semana</span>
        <h1 style={{fontFamily:fd,fontSize:48,color:C.g900,marginTop:12,fontWeight:900}}>Ranking Nacional</h1>
        <p style={{color:C.n500,fontSize:13,marginTop:4,fontWeight:300}}>Você está em 6º lugar — 1.640 XP para o 5º</p>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {RANKING.map((r,i)=>(
          <div key={r.pos} className="card" style={{padding:"14px 18px",display:"flex",alignItems:"center",gap:14,border:r.isUser?`1.5px solid ${C.g500}`:undefined,background:r.isUser?C.g50:undefined}}>
            <span style={{fontFamily:fd,fontSize:18,color:i===0?C.amber:i===1?"#9CA3AF":i===2?"#D97706":C.n400,width:26,textAlign:"center",fontWeight:900}}>
              {i<3?["1","2","3"][i]:r.pos}
            </span>
            <div style={{width:36,height:36,borderRadius:8,background:r.isUser?C.g600:C.g50,border:`1.5px solid ${r.isUser?C.g600:C.n100}`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:14,color:r.isUser?"#fff":C.g700,fontFamily:fd,flexShrink:0}}>
              {r.name[0]}
            </div>
            <div style={{flex:1}}>
              <p style={{fontWeight:600,fontSize:14,color:r.isUser?C.g700:C.n900}}>{r.name}{r.isUser?" — você":""}</p>
              <p style={{color:C.n400,fontSize:11}}>{r.streak} dias de streak</p>
            </div>
            <div style={{textAlign:"right"}}>
              <p style={{fontFamily:fd,fontSize:22,color:i<3?C.amber:r.isUser?C.g600:C.n700,fontWeight:900}}>{r.xp.toLocaleString()}</p>
              <p style={{color:C.n400,fontSize:9,letterSpacing:1,textTransform:"uppercase"}}>XP</p>
            </div>
          </div>
        ))}
      </div>
      <div style={{marginTop:14,background:C.g50,border:`1.5px solid ${C.n100}`,borderRadius:10,padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <p style={{color:C.g700,fontSize:13,fontWeight:600}}>Estude mais hoje para subir no ranking</p>
        <button className="btn-green" style={{padding:"7px 16px",fontSize:12}}>Estudar agora →</button>
      </div>
    </div>
  );
}

// ── SPIN MODAL ────────────────────────────────────────────────────
function SpinModal({onClose,addXP,addCoins}){
  const prizes=["50 XP","100 XP","20 créditos","50 créditos","Escudo","7 dias grátis"];
  const colors=[C.g600,C.g700,C.amber,C.amber,C.sky,"#7C3AED"];
  const [deg,setDeg]=useState(0);
  const [prize,setPrize]=useState(null);
  const [spinning,setSpinning]=useState(false);

  const spin=()=>{
    if(spinning||prize)return;
    setSpinning(true);
    const extra=720+Math.random()*360;
    setDeg(d=>d+extra);
    const idx=Math.floor(Math.random()*prizes.length);
    setTimeout(()=>{setPrize(prizes[idx]);setSpinning(false);if(idx===0)addXP(50);if(idx===1)addXP(100);if(idx===2)addCoins(20);if(idx===3)addCoins(50);},2800);
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(20,64,26,.65)",backdropFilter:"blur(10px)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={prize?onClose:undefined}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",border:`1px solid ${C.n100}`,borderRadius:20,padding:36,maxWidth:380,width:"100%",textAlign:"center",boxShadow:"0 24px 64px rgba(0,0,0,.15)"}}>
        <p style={{color:C.n500,fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>Recompensa diária</p>
        <h2 style={{fontFamily:fd,fontSize:28,color:C.g900,marginBottom:24,fontWeight:900}}>Roleta de Prêmios</h2>

        <div style={{position:"relative",width:200,height:200,margin:"0 auto 24px"}}>
          <div style={{position:"absolute",top:"-14px",left:"50%",transform:"translateX(-50%)",color:C.g700,fontSize:22}}>▼</div>
          <div style={{width:"100%",height:"100%",borderRadius:"50%",background:`conic-gradient(${colors.map((c,i)=>`${c} ${i/colors.length*360}deg ${(i+1)/colors.length*360}deg`).join(",")})`,transform:`rotate(${deg}deg)`,transition:spinning?"transform 2.8s cubic-bezier(.17,.67,.12,.99)":"none",border:`4px solid ${C.n100}`,boxShadow:"0 8px 32px rgba(26,92,34,.15)"}}/>
          <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:38,height:38,borderRadius:"50%",background:"#fff",border:`3px solid ${C.n100}`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:fd,fontSize:16,color:C.g700,fontWeight:900,zIndex:5}}>E</div>
        </div>

        {prize?(
          <div style={{background:C.g50,border:`1.5px solid ${C.g400}`,borderRadius:12,padding:18,marginBottom:18}}>
            <p style={{color:C.n500,fontSize:11,fontWeight:700,letterSpacing:1,marginBottom:6,textTransform:"uppercase"}}>Você ganhou</p>
            <p style={{fontFamily:fd,fontSize:32,color:C.g700,fontWeight:900}}>{prize}</p>
          </div>
        ):(
          <div style={{background:C.g50,border:`1px solid ${C.n100}`,borderRadius:8,padding:10,marginBottom:16}}>
            <p style={{color:C.n400,fontSize:10,marginBottom:6,textTransform:"uppercase",letterSpacing:1,fontWeight:600}}>Prêmios possíveis</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:5,justifyContent:"center"}}>
              {prizes.map((p,i)=>(
                <span key={p} style={{background:"#fff",border:`1px solid ${C.n100}`,borderRadius:100,padding:"2px 10px",fontSize:10,color:colors[i],fontWeight:700}}>{p}</span>
              ))}
            </div>
          </div>
        )}

        {!prize&&<button onClick={spin} disabled={spinning} className="btn-green" style={{width:"100%",padding:"12px",fontSize:15,marginBottom:10,opacity:spinning?.7:1}}>
          {spinning?"Girando...":"Girar agora"}
        </button>}
        <button onClick={onClose} className="btn-outline" style={{padding:"8px 20px",fontSize:12}}>
          {prize?"Fechar":"Cancelar"}
        </button>
      </div>
    </div>
  );
}

// ── CHECKOUT ──────────────────────────────────────────────────────
function Checkout({plan,go}){
  const [method,setMethod]=useState("pix");
  const [success,setSuccess]=useState(false);
  const [loading,setLoading]=useState(false);
  const pay=()=>{setLoading(true);setTimeout(()=>{setLoading(false);setSuccess(true);},1800);};
  const inp={width:"100%",background:C.g50,border:`1.5px solid ${C.n100}`,borderRadius:8,padding:"11px 14px",color:C.n900,fontFamily:ff,fontSize:14};

  if(!plan)return null;

  if(success)return(
    <div style={{maxWidth:420,margin:"0 auto",padding:"80px 28px",textAlign:"center"}}>
      <div style={{width:72,height:72,background:C.g100,border:`2px solid ${C.g500}`,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 20px"}}>✓</div>
      <h1 style={{fontFamily:fd,fontSize:44,color:C.g700,marginBottom:10,fontWeight:900}}>Pagamento aprovado!</h1>
      <p style={{color:C.n500,marginBottom:28,fontSize:14,lineHeight:1.7,fontWeight:300}}>Plano <strong style={{color:C.n900}}>{plan.label}</strong> ativado. Verifique seu e-mail com os dados de acesso.</p>
      <button onClick={()=>go("dashboard")} className="btn-green" style={{padding:"13px 28px",fontSize:15}}>Acessar dashboard →</button>
    </div>
  );

  return(
    <div style={{maxWidth:520,margin:"0 auto",padding:"40px 28px"}}>
      <button onClick={()=>go("landing")} style={{background:"transparent",border:"none",color:C.n500,cursor:"pointer",fontFamily:ff,marginBottom:20,fontSize:13}}>← Voltar</button>
      <p style={{color:C.n500,fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Finalizar compra</p>
      <h1 style={{fontFamily:fd,fontSize:40,color:C.g900,marginBottom:20,fontWeight:900}}>Checkout seguro</h1>

      <div className="card" style={{padding:18,marginBottom:20,border:plan.hi?`1.5px solid ${C.g600}`:undefined}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <p style={{fontWeight:700,fontSize:16,color:C.n900}}>{plan.label}</p>
            <p style={{color:C.n500,fontSize:12,marginTop:2}}>ENEMPro · Créditos ilimitados</p>
          </div>
          <div style={{textAlign:"right"}}>
            <p style={{fontFamily:fd,fontSize:38,color:C.g700,fontWeight:900}}>R${plan.price}</p>
            <p style={{color:C.n400,fontSize:11}}>{plan.period}</p>
          </div>
        </div>
        <div style={{borderTop:`1px solid ${C.n100}`,marginTop:12,paddingTop:12,display:"flex",gap:16,flexWrap:"wrap"}}>
          {["✓ Garantia 7 dias","✓ Acesso imediato","✓ Créditos ilimitados"].map(t=>(
            <span key={t} style={{color:C.g600,fontSize:11,fontWeight:600}}>{t}</span>
          ))}
        </div>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:18}}>
        {[["pix","PIX"],["card","Cartão"]].map(([m,l])=>(
          <button key={m} onClick={()=>setMethod(m)} className={method===m?"btn-green":"btn-outline"} style={{flex:1,padding:"10px"}}>
            {l}
          </button>
        ))}
      </div>

      {method==="pix"?(
        <div className="card" style={{padding:22,textAlign:"center"}}>
          <div style={{width:140,height:140,background:C.g50,border:`1px solid ${C.n100}`,borderRadius:12,margin:"0 auto 14px",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <p style={{color:C.n400,fontSize:11,lineHeight:1.6}}>QR Code PIX<br/>via seu gateway</p>
          </div>
          <div style={{background:C.g50,border:`1px solid ${C.n100}`,borderRadius:6,padding:"8px 12px",fontFamily:"monospace",fontSize:10,color:C.n400,marginBottom:18,wordBreak:"break-all",textAlign:"left"}}>
            00020126580014br.gov.bcb.pix0136[SEU-GATEWAY]
          </div>
          <button onClick={pay} disabled={loading} className="btn-green" style={{width:"100%",padding:"12px",fontSize:14,opacity:loading?.7:1}}>
            {loading?"Confirmando...":"Confirmar PIX ✓"}
          </button>
        </div>
      ):(
        <div className="card" style={{padding:22}}>
          {[["Número do cartão","0000 0000 0000 0000"],["Nome no cartão","NOME COMPLETO"]].map(([l,ph])=>(
            <div key={l} style={{marginBottom:12}}>
              <label style={{color:C.n700,fontSize:11,fontWeight:600,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>{l}</label>
              <input style={inp} placeholder={ph}/>
            </div>
          ))}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>
            {[["Validade","12/28"],["CVV","•••"]].map(([l,ph])=>(
              <div key={l}><label style={{color:C.n700,fontSize:11,fontWeight:600,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>{l}</label><input style={inp} placeholder={ph}/></div>
            ))}
          </div>
          <button onClick={pay} disabled={loading} className="btn-green" style={{width:"100%",padding:"12px",fontSize:14,opacity:loading?.7:1}}>
            {loading?"Processando...":` Pagar R$${plan.price}${plan.period}`}
          </button>
        </div>
      )}
      <p style={{color:C.n300,fontSize:10,textAlign:"center",marginTop:12}}>🔒 SSL · PCI DSS · Dados criptografados</p>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
