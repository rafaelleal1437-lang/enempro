<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ENEMPro — Estude. Evolua. Passe.</title>
  <meta name="description" content="A plataforma gamificada de aprovação no ENEM. XP, streak, missões, ranking e muito mais."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Bebas+Neue&display=swap"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{min-height:100vh;background:#080810}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:#1E2035;border-radius:2px}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">

const C = {
  bg:"#080810", ink:"#0C0C18", surface:"#10101E", lift:"#161628",
  edge:"#1E1E35", edgeLight:"#252540",
  lime:"#39FF14", limeD:"#22C55E", limeFade:"rgba(57,255,20,0.08)",
  amber:"#FFB800", amberFade:"rgba(255,184,0,0.08)",
  rose:"#FF3860", roseFade:"rgba(255,56,96,0.07)",
  sky:"#38BDF8", violet:"#818CF8",
  snow:"#F0F0FF", ash:"#5A5A7A", fog:"#35354A",
  white:"#FFFFFF",
};
const ff="'Outfit',sans-serif";
const fd="'Bebas Neue',sans-serif";

function getLevel(xp){
  const tiers=[0,100,250,500,900,1400,2000,2700,3600,5000];
  let lv=0;
  for(let i=0;i<tiers.length;i++) if(xp>=tiers[i]) lv=i+1;
  const cur=tiers[lv-1]||0, nxt=tiers[lv]||cur+1000;
  return{level:lv,pct:Math.round(((xp-cur)/(nxt-cur))*100),nextXp:nxt,curXp:xp};
}

const QUESTIONS=[
  {id:1,area:"Matemática",year:2023,q:"Uma empresa precisa transportar 34 toneladas usando caminhões de 4 toneladas. Qual o número mínimo de caminhões?",opts:["7","8","9","10"],ans:2,xp:15,exp:"34 ÷ 4 = 8,5. Arredonda para cima: 9 caminhões."},
  {id:2,area:"Português",year:2022,q:"Saussure compara a língua a outros sistemas de signos. Isso define língua como:",opts:["Código exclusivo da fala","Sistema biológico","Signos articulados vocalmente","Sistema de signos entre outros sistemas"],ans:3,xp:15,exp:"Saussure define língua como um sistema entre outros sistemas de signos."},
  {id:3,area:"Biologia",year:2023,q:"Após uso de antibióticos, bactérias resistentes sobrevivem. Qual processo evolutivo explica isso?",opts:["Mutação induzida","Seleção natural de variantes pré-existentes","Adaptação fenotípica","Herança de caracteres adquiridos"],ans:1,xp:15,exp:"Seleção natural: bactérias já resistentes sobrevivem e se reproduzem."},
  {id:4,area:"História",year:2022,q:"O Renascimento rompeu com o pensamento medieval principalmente por:",opts:["Valorizar a fé acima da razão","Retomar valores greco-romanos e o antropocentrismo","Defender a Igreja nas artes","Propor retorno ao feudalismo"],ans:1,xp:15,exp:"O Humanismo renascentista colocou o ser humano no centro, em oposição ao teocentrismo medieval."},
  {id:5,area:"Química",year:2023,q:"2NaHCO₃→Na₂CO₃+H₂O+CO₂. Com 16,8g de NaHCO₃ (M=84), qual volume de CO₂ a 0°C/1atm?",opts:["1,12 L","2,24 L","4,48 L","6,72 L"],ans:1,xp:20,exp:"0,2 mol NaHCO₃ → 0,1 mol CO₂ → 0,1×22,4 = 2,24 L."},
  {id:6,area:"Geografia",year:2022,q:"Regiões metropolitanas brasileiras caracterizam-se por:",opts:["Distribuição equilibrada de renda","Integração funcional ao redor de uma metrópole","Redução dos fluxos migratórios","Descentralização industrial"],ans:1,xp:15,exp:"Integração funcional de municípios ao redor de uma cidade polo."},
];

const PLANS=[
  {id:"free",label:"Gratuito",sub:"Para começar",price:0,period:"",cta:"Criar conta",hi:false,
   items:["10 questões por dia","Streak e XP básico","Anúncios exibidos","Ranking geral"]},
  {id:"basico",label:"Básico",sub:"Mais popular",price:39,period:"/mês",cta:"Assinar Básico",hi:false,
   items:["Questões ilimitadas","2 simulados/mês","Sem anúncios","Correção por IA","Missões premium"]},
  {id:"premium",label:"Premium",sub:"Melhor custo-benefício",price:59,period:"/mês",cta:"Assinar Premium",hi:true,
   items:["Tudo do Básico","Simulados ilimitados","Redação com professor","Mentoria semanal ao vivo","Suporte 24h","Grupo no WhatsApp"]},
  {id:"vitalicio",label:"Vitalício",sub:"Pague uma vez",price:297,period:" único",cta:"Garantir Acesso",hi:false,
   items:["Acesso permanente","Tudo do Premium","Todos os ENEMs futuros","Suporte VIP"]},
];

const MISSIONS=[
  {label:"10 questões hoje",prog:3,total:10,xp:50,coins:5,done:false},
  {label:"Manter sequência",prog:1,total:1,xp:25,coins:2,done:true},
  {label:"Sessão de 25 min",prog:0,total:1,xp:40,coins:4,done:false},
];

const RANKING=[
  {pos:1,name:"Ana Carolina",xp:4820,streak:45},{pos:2,name:"Pedro Henrique",xp:4650,streak:38},
  {pos:3,name:"Mariana Silva",xp:4430,streak:31},{pos:4,name:"Lucas Ferreira",xp:3980,streak:27},
  {pos:5,name:"Julia Santos",xp:3750,streak:22},{pos:6,name:"Você",xp:2340,streak:7,isUser:true},
  {pos:7,name:"Carlos Lima",xp:2100,streak:5},{pos:8,name:"Fernanda Costa",xp:1980,streak:3},
];

const SPIN_PRIZES=["50 XP","100 XP","20 coins","50 coins","Escudo","Premium 7d"];
const SPIN_COLORS=["#39FF14","#22C55E","#FFB800","#F59E0B","#818CF8","#38BDF8"];

export default function App(){
  const [page,setPage]=useState("landing");
  const [authModal,setAuthModal]=useState(null);
  const [user,setUser]=useState(null);
  const [plan,setPlan]=useState(null);
  const [spinModal,setSpinModal]=useState(false);
  const [xpPopup,setXpPopup]=useState(null);
  const [days,setDays]=useState(166);

  useEffect(()=>{
    const link=document.createElement("link");
    link.rel="stylesheet";
    link.href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Bebas+Neue&display=swap";
    document.head.appendChild(link);
    setDays(Math.max(0,Math.ceil((new Date("2026-11-08")-new Date())/86400000)));
  },[]);

  const go=(p)=>{setPage(p);window.scrollTo(0,0);};
  const login=(name,email)=>{setUser({name,email,plan:"free",xp:2340,coins:85,streak:7,shields:1});setAuthModal(null);go("dashboard");};
  const logout=()=>{setUser(null);go("landing");};
  const openCheckout=(p)=>{setPlan(p);go("checkout");};
  const addXP=(v)=>{if(!user)return;setUser(u=>({...u,xp:u.xp+v}));setXpPopup(`+${v} XP`);setTimeout(()=>setXpPopup(null),1800);};
  const addCoins=(v)=>{if(!user)return;setUser(u=>({...u,coins:u.coins+v}));};
  const lv=user?getLevel(user.xp):{level:1,pct:0,nextXp:100,curXp:0};

  return(
    <div style={{background:C.bg,color:C.snow,fontFamily:ff,minHeight:"100vh",position:"relative"}}>
      <style>{`
        *{box-sizing:border-box;margin:0;padding:0}
        ::placeholder{color:${C.ash}}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:${C.edge};border-radius:2px}
        @keyframes up{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-32px)}}
        @keyframes in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes flicker{0%,100%{opacity:1}45%{opacity:.8}50%{opacity:1}55%{opacity:.7}}
        @keyframes rotateWheel{to{transform:rotate(360deg)}}
        @keyframes scanline{0%{background-position:0 0}100%{background-position:0 100%}}
        input:focus{outline:none;border-color:${C.lime}!important}
        .hov:hover{border-color:${C.edgeLight}!important;transform:translateY(-1px)}
      `}</style>

      {/* Grain overlay */}
      <div style={{position:"fixed",inset:0,backgroundImage:"url(\"data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='.03'/%3E%3C/svg%3E\")",pointerEvents:"none",zIndex:999,opacity:.4}}/>

      {xpPopup&&<div style={{position:"fixed",top:72,right:20,background:C.lime,color:"#000",padding:"5px 14px",borderRadius:4,fontWeight:800,fontSize:13,zIndex:500,animation:"up 1.8s ease forwards",letterSpacing:1}}>{xpPopup}</div>}

      <Nav user={user} page={page} go={go} onLogin={()=>setAuthModal("login")} onRegister={()=>setAuthModal("register")} onLogout={logout} lv={lv} openSpin={()=>setSpinModal(true)}/>

      <div style={{animation:"in .25s ease"}} key={page}>
        {page==="landing"    && <Landing days={days} go={go} setModal={setAuthModal} openCheckout={openCheckout}/>}
        {page==="exercises"  && <Exercises user={user} setModal={setAuthModal} addXP={addXP} addCoins={addCoins}/>}
        {page==="strategies" && <Strategies/>}
        {page==="ranking"    && <Ranking user={user}/>}
        {page==="dashboard"  && user && <Dashboard user={user} go={go} openCheckout={openCheckout} lv={lv} openSpin={()=>setSpinModal(true)}/>}
        {page==="checkout"   && <Checkout plan={plan} go={go}/>}
      </div>

      {authModal&&<AuthModal mode={authModal} onClose={()=>setAuthModal(null)} onSwitch={m=>setAuthModal(m)} onSuccess={login}/>}
      {spinModal&&<SpinModal onClose={()=>setSpinModal(false)} addXP={addXP} addCoins={addCoins}/>}
    </div>
  );
}

/* ─── NAV ───────────────────────────────────────────────────────── */
function Nav({user,page,go,onLogin,onRegister,onLogout,lv,openSpin}){
  return(
    <header style={{position:"sticky",top:0,zIndex:100,borderBottom:`1px solid ${C.edge}`,background:"rgba(8,8,16,.96)",backdropFilter:"blur(24px)",height:56,display:"flex",alignItems:"center",padding:"0 28px",gap:24,justifyContent:"space-between"}}>
      <div onClick={()=>go("landing")} style={{cursor:"pointer",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <svg width="28" height="28" viewBox="0 0 28 28"><rect width="28" height="28" rx="7" fill={C.lime}/><text x="14" y="20" textAnchor="middle" fontFamily="Bebas Neue" fontSize="18" fill="#000">E</text></svg>
        <span style={{fontFamily:fd,fontSize:20,letterSpacing:4,color:C.snow}}>ENEM<span style={{color:C.lime}}>PRO</span></span>
      </div>

      <nav style={{display:"flex",gap:2}}>
        {[["exercises","Exercícios"],["strategies","Estratégias"],["ranking","Ranking"]].map(([p,l])=>(
          <button key={p} onClick={()=>go(p)} style={{background:"transparent",border:"none",color:page===p?C.snow:C.ash,padding:"5px 14px",borderRadius:6,cursor:"pointer",fontFamily:ff,fontWeight:600,fontSize:13,borderBottom:page===p?`2px solid ${C.lime}`:"2px solid transparent",transition:"all .15s"}}>
            {l}
          </button>
        ))}
        {user&&<button onClick={()=>go("dashboard")} style={{background:"transparent",border:"none",color:page==="dashboard"?C.snow:C.ash,padding:"5px 14px",borderRadius:6,cursor:"pointer",fontFamily:ff,fontWeight:600,fontSize:13,borderBottom:page==="dashboard"?`2px solid ${C.lime}`:"2px solid transparent"}}>Dashboard</button>}
      </nav>

      <div style={{display:"flex",alignItems:"center",gap:10}}>
        {user?(
          <>
            <div style={{display:"flex",gap:12,alignItems:"center",background:C.surface,border:`1px solid ${C.edge}`,borderRadius:8,padding:"5px 14px",fontSize:12,fontWeight:700}}>
              <span style={{color:C.rose}}>▲ {user.streak}d</span>
              <span style={{color:C.fog,fontSize:10}}>|</span>
              <span style={{color:C.lime}}>{user.xp.toLocaleString()} XP</span>
              <span style={{color:C.fog,fontSize:10}}>|</span>
              <span style={{color:C.amber}}>{user.coins} ◎</span>
            </div>
            <button onClick={openSpin} style={{background:"transparent",border:`1px solid ${C.violet}`,color:C.violet,padding:"5px 12px",borderRadius:6,cursor:"pointer",fontFamily:ff,fontWeight:700,fontSize:12}}>Girar</button>
            <div onClick={onLogout} title="Sair" style={{width:30,height:30,borderRadius:6,background:C.lime,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"#000",cursor:"pointer",fontSize:13,fontFamily:fd}}>{user.name[0].toUpperCase()}</div>
          </>
        ):(
          <>
            <button onClick={onLogin} style={{background:"transparent",border:`1px solid ${C.edge}`,color:C.ash,padding:"6px 16px",borderRadius:6,cursor:"pointer",fontFamily:ff,fontWeight:600,fontSize:13}}>Entrar</button>
            <button onClick={onRegister} style={{background:C.lime,border:"none",color:"#000",padding:"6px 16px",borderRadius:6,cursor:"pointer",fontFamily:ff,fontWeight:700,fontSize:13}}>Começar grátis</button>
          </>
        )}
      </div>
    </header>
  );
}

/* ─── LANDING ────────────────────────────────────────────────────── */
function Landing({days,go,setModal,openCheckout}){
  const [count,setCount]=useState({d:0,h:0,m:0,s:0});
  useEffect(()=>{
    const t=setInterval(()=>{
      const d=new Date("2026-11-08T08:00:00")-new Date();
      if(d>0) setCount({d:Math.floor(d/86400000),h:Math.floor((d%86400000)/3600000),m:Math.floor((d%3600000)/60000),s:Math.floor((d%60000)/1000)});
    },1000);
    return()=>clearInterval(t);
  },[]);

  return(
    <main>
      {/* ── HERO ─────────────────────────────────────────────── */}
      <section style={{maxWidth:1080,margin:"0 auto",padding:"80px 28px 60px",display:"grid",gridTemplateColumns:"1fr 420px",gap:64,alignItems:"center"}}>
        <div>
          <p style={{color:C.lime,fontSize:11,fontWeight:700,letterSpacing:3,textTransform:"uppercase",marginBottom:20}}>Plataforma de aprovação ENEM 2026</p>
          <h1 style={{fontFamily:fd,fontSize:88,lineHeight:.9,marginBottom:24,color:C.snow}}>
            ESTUDE.<br/>EVOLUA.<br/><span style={{WebkitTextStroke:`2px ${C.lime}`,color:"transparent",animation:"flicker 4s infinite"}}>PASSE.</span>
          </h1>
          <p style={{color:C.ash,fontSize:16,lineHeight:1.8,marginBottom:32,maxWidth:400,fontWeight:300}}>
            XP, streak, missões e ranking — a única plataforma que transforma a rotina de estudos em progressão real e mensurável.
          </p>

          {/* Countdown */}
          <div style={{display:"flex",gap:3,marginBottom:32,alignItems:"flex-end"}}>
            {[{v:count.d,l:"dias"},{v:count.h,l:"hr"},{v:count.m,l:"min"},{v:count.s,l:"seg"}].map(({v,l},i)=>(
              <div key={l} style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
                <div style={{background:C.surface,border:`1px solid ${C.edge}`,borderRadius:6,padding:"8px 14px",minWidth:58,textAlign:"center"}}>
                  <span style={{fontFamily:fd,fontSize:32,color:i===0?C.rose:C.snow,lineHeight:1}}>{String(v).padStart(2,"0")}</span>
                </div>
                <span style={{color:C.ash,fontSize:9,marginTop:4,letterSpacing:1,textTransform:"uppercase"}}>{l}</span>
              </div>
            ))}
          </div>

          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setModal("register")} style={{background:C.lime,border:"none",color:"#000",padding:"13px 28px",borderRadius:6,cursor:"pointer",fontFamily:ff,fontWeight:800,fontSize:15}}>
              Criar conta grátis
            </button>
            <button onClick={()=>go("exercises")} style={{background:"transparent",border:`1px solid ${C.edge}`,color:C.ash,padding:"13px 20px",borderRadius:6,cursor:"pointer",fontFamily:ff,fontWeight:500,fontSize:14}}>
              Ver exercícios →
            </button>
          </div>

          <div style={{display:"flex",gap:24,marginTop:28}}>
            {["12.000+ aprovados","4.9 / 5 avaliação","Garantia de 7 dias"].map(t=>(
              <span key={t} style={{color:C.ash,fontSize:12,display:"flex",alignItems:"center",gap:5}}>
                <span style={{color:C.lime,fontSize:10}}>✓</span>{t}
              </span>
            ))}
          </div>
        </div>

        {/* Dashboard preview */}
        <div style={{background:C.surface,border:`1px solid ${C.edge}`,borderRadius:16,padding:0,overflow:"hidden"}}>
          {/* Terminal header */}
          <div style={{background:C.ink,borderBottom:`1px solid ${C.edge}`,padding:"10px 16px",display:"flex",alignItems:"center",gap:6}}>
            <span style={{width:10,height:10,borderRadius:"50%",background:"#FF5F57",display:"inline-block"}}/>
            <span style={{width:10,height:10,borderRadius:"50%",background:"#FEBC2E",display:"inline-block"}}/>
            <span style={{width:10,height:10,borderRadius:"50%",background:"#28C840",display:"inline-block"}}/>
            <span style={{color:C.ash,fontSize:11,marginLeft:8,fontFamily:"monospace"}}>dashboard · Ana Carolina</span>
          </div>
          <div style={{padding:20}}>
            {/* Level bar */}
            <div style={{marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <span style={{fontSize:11,color:C.ash,fontWeight:600,letterSpacing:1}}>NÍV. 9 — VETERANO</span>
                <span style={{fontSize:11,color:C.lime,fontWeight:700}}>82%</span>
              </div>
              <div style={{height:3,background:C.edge,borderRadius:2}}>
                <div style={{height:"100%",width:"82%",background:C.lime,borderRadius:2,boxShadow:`0 0 8px ${C.lime}`}}/>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
              {[{l:"STREAK",v:"45d",c:C.rose},{l:"XP TOTAL",v:"4.820",c:C.lime},{l:"COINS",v:"340",c:C.amber}].map(({l,v,c})=>(
                <div key={l} style={{background:C.ink,border:`1px solid ${C.edge}`,borderRadius:8,padding:"10px 8px",textAlign:"center"}}>
                  <p style={{color:C.ash,fontSize:9,letterSpacing:1,marginBottom:4}}>{l}</p>
                  <p style={{fontFamily:fd,fontSize:22,color:c,lineHeight:1}}>{v}</p>
                </div>
              ))}
            </div>
            <div style={{background:C.ink,border:`1px solid ${C.edge}`,borderRadius:8,padding:12,marginBottom:10}}>
              <p style={{color:C.ash,fontSize:9,letterSpacing:1,marginBottom:8}}>MISSÕES DE HOJE</p>
              {[{t:"10 questões respondidas",xp:50,done:true},{t:"Sessão Pomodoro (25min)",xp:40,done:false}].map((m,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:i===0?6:0}}>
                  <span style={{fontSize:12,color:m.done?C.lime:C.snow,textDecoration:m.done?"line-through":"none",fontWeight:m.done?400:500}}>{m.t}</span>
                  <span style={{fontSize:11,color:C.amber,fontWeight:700}}>+{m.xp}</span>
                </div>
              ))}
            </div>
            <div style={{background:"rgba(129,140,248,.07)",border:"1px solid rgba(129,140,248,.2)",borderRadius:8,padding:"9px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{color:C.violet,fontSize:12,fontWeight:600}}>Roleta disponível hoje</span>
              <span style={{background:C.violet,color:"#fff",fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:4}}>Girar</span>
            </div>
          </div>
        </div>
      </section>

      {/* ── DIVIDER ───────────────────────────────────────────── */}
      <div style={{borderTop:`1px solid ${C.edge}`,borderBottom:`1px solid ${C.edge}`,padding:"14px 28px",background:C.ink}}>
        <div style={{maxWidth:1080,margin:"0 auto",display:"flex",justifyContent:"space-around",flexWrap:"wrap",gap:16}}>
          {[["12.000+","Alunos aprovados"],["4.9★","Avaliação"],["5.000+","Questões no banco"],["87%","Aprovação em federal"]].map(([n,l])=>(
            <div key={l} style={{textAlign:"center"}}>
              <p style={{fontFamily:fd,fontSize:26,color:C.lime,lineHeight:1}}>{n}</p>
              <p style={{color:C.ash,fontSize:11,marginTop:3,letterSpacing:.5}}>{l}</p>
            </div>
          ))}
        </div>
      </div>

      {/* ── FEATURES ──────────────────────────────────────────── */}
      <section style={{maxWidth:1080,margin:"0 auto",padding:"72px 28px"}}>
        <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:48}}>
          <h2 style={{fontFamily:fd,fontSize:56,lineHeight:.95}}>
            POR QUE O<br/><span style={{color:C.lime}}>ENEMPRO?</span>
          </h2>
          <p style={{color:C.ash,fontSize:14,maxWidth:280,textAlign:"right",lineHeight:1.7}}>Mais do que questões. Uma plataforma de progressão real — como os melhores apps de idiomas, mas para o ENEM.</p>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:1,background:C.edge,border:`1px solid ${C.edge}`,borderRadius:12,overflow:"hidden"}}>
          {[
            {n:"01",title:"Streak diário",desc:"Mantenha sua sequência e ganhe XP, coins e recompensas a cada dia de estudo sem quebrar."},
            {n:"02",title:"XP e Níveis",desc:"Suba de nível respondendo questões. Seu progresso é visível, mensurável e motivador."},
            {n:"03",title:"Missões",desc:"Desafios diários e semanais com recompensas reais — mantendo o foco sem depender de força de vontade."},
            {n:"04",title:"Roleta de prêmios",desc:"Gire após manter o streak e ganhe XP dobrado, coins, escudos ou até acesso premium temporário."},
            {n:"05",title:"Ranking nacional",desc:"Compete com alunos de todo o Brasil. Veja sua posição em tempo real e suba na classificação."},
            {n:"06",title:"IA Tutor",desc:"Em desenvolvimento: tutor inteligente que explica, tira dúvidas e cria seu plano personalizado.",soon:true},

/* ─── AUTH MODAL ─────────────────────────────────────────────────── */
function AuthModal({mode,onClose,onSwitch,onSuccess}){
  const [name,setName]=useState(""),[ email,setEmail]=useState(""),[ pass,setPass]=useState("");
  const inp={width:"100%",background:C.surface,border:`1px solid ${C.edge}`,borderRadius:6,padding:"11px 14px",color:C.snow,fontFamily:ff,fontSize:14,marginBottom:10};
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",backdropFilter:"blur(12px)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.ink,border:`1px solid ${C.edge}`,borderRadius:12,padding:32,width:"100%",maxWidth:380}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
          <h2 style={{fontFamily:fd,fontSize:28,letterSpacing:2}}>{mode==="login"?"ENTRAR":"CRIAR CONTA"}</h2>
          <button onClick={onClose} style={{background:"transparent",border:"none",color:C.ash,cursor:"pointer",fontSize:18,lineHeight:1}}>✕</button>
        </div>
        {mode==="register"&&<input style={inp} placeholder="Seu nome" value={name} onChange={e=>setName(e.target.value)}/>}
        <input style={inp} type="email" placeholder="E-mail" value={email} onChange={e=>setEmail(e.target.value)}/>
        <input style={{...inp,marginBottom:16}} type="password" placeholder="Senha" value={pass} onChange={e=>setPass(e.target.value)}/>
        <button onClick={()=>onSuccess(name||email.split("@")[0]||"Aluno",email)} style={{width:"100%",background:C.lime,border:"none",color:"#000",padding:"12px",borderRadius:6,cursor:"pointer",fontFamily:ff,fontWeight:800,fontSize:15,marginBottom:10}}>
          {mode==="login"?"Entrar":"Criar conta grátis"}
        </button>
        <p style={{color:C.ash,fontSize:12,textAlign:"center",lineHeight:1.6}}>
          {mode==="login"?"Não tem conta? ":"Já tem conta? "}
          <span onClick={()=>onSwitch(mode==="login"?"register":"login")} style={{color:C.lime,cursor:"pointer",fontWeight:700}}>
            {mode==="login"?"Criar conta":"Entrar"}
          </span>
        </p>
        <p style={{color:C.fog,fontSize:11,textAlign:"center",marginTop:14}}>Garantia de 7 dias · Dados criptografados</p>
      </div>
    </div>
  );
}

/* ─── EXERCISES ──────────────────────────────────────────────────── */
function Exercises({user,setModal,addXP,addCoins}){
  const [idx,setIdx]=useState(0);
  const [sel,setSel]=useState(null);
  const [pom,setPom]=useState(25*60);
  const [pomOn,setPomOn]=useState(false);
  const [pomMode,setPomMode]=useState("focus");
  const ref=useRef(null);
  const q=QUESTIONS[idx];
  const ans=sel!==null;

  useEffect(()=>{
    if(pomOn){ ref.current=setInterval(()=>setPom(t=>{ if(t<=1){clearInterval(ref.current);setPomOn(false);addXP&&addXP(40);return pomMode==="focus"?5*60:25*60;} return t-1; }),1000); }
    return()=>clearInterval(ref.current);
  },[pomOn]);

  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const pick=(i)=>{ if(ans)return; setSel(i); if(i===q.ans){addXP&&addXP(q.xp);addCoins&&addCoins(2);} };

  return(
    <div style={{maxWidth:760,margin:"0 auto",padding:"32px 28px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24,flexWrap:"wrap",gap:12}}>
        <div>
          <p style={{color:C.ash,fontSize:10,letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>Banco de questões ENEM</p>
          <h1 style={{fontFamily:fd,fontSize:40}}>{idx+1}<span style={{color:C.ash}}>/{QUESTIONS.length}</span></h1>
        </div>
        {/* Pomodoro */}
        <div style={{background:C.surface,border:`1px solid ${pomOn?C.lime:C.edge}`,borderRadius:8,padding:"10px 16px",display:"flex",alignItems:"center",gap:12}}>
          <div>
            <p style={{color:C.ash,fontSize:9,letterSpacing:2,marginBottom:2}}>{pomMode==="focus"?"FOCO":"PAUSA"}</p>
            <p style={{fontFamily:fd,fontSize:26,color:pomOn?C.lime:C.snow,lineHeight:1}}>{fmt(pom)}</p>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <button onClick={()=>setPomOn(a=>!a)} style={{background:pomOn?C.rose:C.lime,border:"none",color:"#000",padding:"4px 10px",borderRadius:4,cursor:"pointer",fontFamily:ff,fontWeight:700,fontSize:11}}>
              {pomOn?"Pausar":"Iniciar"}
            </button>
            <button onClick={()=>{setPomOn(false);setPom(25*60);setPomMode("focus");}} style={{background:"transparent",border:`1px solid ${C.edge}`,color:C.ash,padding:"3px 8px",borderRadius:4,cursor:"pointer",fontFamily:ff,fontSize:10}}>Reset</button>
          </div>
        </div>
      </div>

      {/* Progress */}
      <div style={{height:2,background:C.edge,borderRadius:1,marginBottom:24}}>
        <div style={{height:"100%",width:`${((idx+1)/QUESTIONS.length)*100}%`,background:C.lime,borderRadius:1,transition:"width .4s"}}/>
      </div>

      <div style={{background:C.surface,border:`1px solid ${C.edge}`,borderRadius:10,padding:24,marginBottom:12}}>
        <div style={{display:"flex",gap:6,marginBottom:16}}>
          <span style={{border:`1px solid ${C.edge}`,borderRadius:3,padding:"2px 10px",fontSize:10,fontWeight:700,color:C.lime,letterSpacing:1}}>{q.area.toUpperCase()}</span>
          <span style={{border:`1px solid ${C.edge}`,borderRadius:3,padding:"2px 10px",fontSize:10,color:C.ash}}>ENEM {q.year}</span>
          <span style={{border:`1px solid rgba(255,184,0,.2)`,borderRadius:3,padding:"2px 10px",fontSize:10,color:C.amber}}>+{q.xp} XP</span>
        </div>
        <p style={{fontSize:15,lineHeight:1.9,marginBottom:22,color:C.snow,fontWeight:300}}>{q.q}</p>
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          {q.opts.map((opt,i)=>{
            let bg=C.ink,bc=C.edge,col=C.snow;
            if(ans){
              if(i===q.ans){bg=C.limeFade;bc=C.lime;col=C.lime;}
              else if(i===sel&&i!==q.ans){bg=C.roseFade;bc=C.rose;col=C.rose;}
              else{col=C.ash;}
            }
            return(
              <button key={i} onClick={()=>pick(i)} style={{background:bg,border:`1px solid ${bc}`,borderRadius:6,padding:"12px 16px",cursor:ans?"default":"pointer",color:col,fontFamily:ff,fontSize:14,textAlign:"left",transition:"all .15s",display:"flex",gap:12,alignItems:"center",fontWeight:ans&&i===q.ans?600:400}}>
                <span style={{fontFamily:fd,fontSize:14,letterSpacing:1,color:ans&&i===q.ans?C.lime:ans&&i===sel?C.rose:C.fog,flexShrink:0}}>{String.fromCharCode(65+i)}</span>
                {opt}
              </button>
            );
          })}
        </div>
      </div>

      {ans&&(
        <div style={{background:sel===q.ans?C.limeFade:C.roseFade,border:`1px solid ${sel===q.ans?C.lime:C.rose}`,borderRadius:8,padding:14,marginBottom:12}}>
          <p style={{fontWeight:700,color:sel===q.ans?C.lime:C.rose,marginBottom:4,fontSize:12,letterSpacing:1}}>{sel===q.ans?`CORRETO — +${q.xp} XP`:"INCORRETO"}</p>
          <p style={{color:C.ash,fontSize:13,lineHeight:1.8,fontWeight:300}}>{q.exp}</p>
        </div>
      )}

      {!user&&ans&&(
        <div style={{background:C.limeFade,border:"1px solid rgba(57,255,20,.2)",borderRadius:6,padding:"10px 16px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <p style={{color:C.lime,fontSize:12,fontWeight:600}}>Crie uma conta para salvar seu XP e progresso</p>
          <button onClick={()=>setModal("register")} style={{background:C.lime,border:"none",color:"#000",padding:"6px 14px",borderRadius:4,cursor:"pointer",fontFamily:ff,fontWeight:700,fontSize:12}}>Criar conta →</button>
        </div>
      )}

      <div style={{display:"flex",justifyContent:"space-between"}}>
        <button onClick={()=>{if(idx>0){setIdx(i=>i-1);setSel(null);}}} disabled={idx===0} style={{background:"transparent",border:`1px solid ${C.edge}`,color:idx===0?C.fog:C.ash,padding:"9px 18px",borderRadius:6,cursor:idx===0?"default":"pointer",fontFamily:ff,fontWeight:600,fontSize:13}}>← Anterior</button>
        <button onClick={()=>{if(idx<QUESTIONS.length-1){setIdx(i=>i+1);setSel(null);}}} disabled={idx===QUESTIONS.length-1} style={{background:idx===QUESTIONS.length-1?C.surface:C.lime,border:"none",color:idx===QUESTIONS.length-1?C.fog:"#000",padding:"9px 20px",borderRadius:6,cursor:idx===QUESTIONS.length-1?"default":"pointer",fontFamily:ff,fontWeight:700,fontSize:13}}>Próxima →</button>
      </div>
    </div>
  );
}

    {n:"03",tag:"Memorização",title:"Revisão espaçada",body:"Revise no dia seguinte → 3 dias → 7 → 21. Consolida memória de longo prazo. Use as missões semanais da plataforma para manter a cadência."},
    {n:"04",tag:"Redação",title:"Estrutura nota 1000",body:"Tese no 1º parágrafo. Cada desenvolvimento: argumento + evidência + conexão. Proposta: agente + ação + meio + finalidade + detalhamento. Obrigatório."},
    {n:"05",tag:"Prova",title:"Resolução estratégica",body:"Elimine 2 alternativas: chance vai de 20% para 33%. 'Sempre', 'nunca', 'todos' = geralmente pegadinha. Marque, avance, volte. Máx. 3 min por questão."},
    {n:"06",tag:"Mental",title:"Controle da ansiedade",body:"8h de sono nas 3 noites anteriores vale mais que estudar na véspera. Respiração 4-7-8 antes da prova. Chegue 30 min antes do horário."},
  ];
  return(
    <div style={{maxWidth:1080,margin:"0 auto",padding:"40px 28px"}}>
      <div style={{marginBottom:48}}>
        <p style={{color:C.lime,fontSize:11,fontWeight:700,letterSpacing:3,textTransform:"uppercase",marginBottom:10}}>Métodos comprovados</p>
        <h1 style={{fontFamily:fd,fontSize:56}}>ESTRATÉGIAS <span style={{color:C.lime}}>QUE FUNCIONAM.</span></h1>
        <p style={{color:C.ash,fontSize:14,marginTop:8,fontWeight:300}}>Validadas por quem tirou 900+ pontos no ENEM</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:1,background:C.edge,border:`1px solid ${C.edge}`,borderRadius:10,overflow:"hidden"}}>
        {items.map(({n,tag,title,body})=>(
          <div key={n} className="hov" style={{background:C.bg,padding:28,transition:"background .2s",cursor:"default"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
              <span style={{fontFamily:fd,fontSize:13,color:C.lime,letterSpacing:2}}>{n}</span>
              <span style={{border:`1px solid ${C.edge}`,borderRadius:3,padding:"2px 8px",fontSize:9,color:C.ash,letterSpacing:1}}>{tag.toUpperCase()}</span>
            </div>
            <h3 style={{fontWeight:700,fontSize:17,marginBottom:10,color:C.snow}}>{title}</h3>
            <p style={{color:C.ash,fontSize:13,lineHeight:1.8,fontWeight:300}}>{body}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── RANKING ────────────────────────────────────────────────────── */

      <div style={{marginBottom:32}}>
        <p style={{color:C.lime,fontSize:11,fontWeight:700,letterSpacing:3,textTransform:"uppercase",marginBottom:10}}>Esta semana</p>
        <h1 style={{fontFamily:fd,fontSize:56}}>RANKING <span style={{color:C.lime}}>NACIONAL</span></h1>
        <p style={{color:C.ash,fontSize:13,marginTop:6}}>Você está em 6º lugar — 1.640 XP para o 5º</p>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {RANKING.map((r,i)=>(
          <div key={r.pos} style={{background:r.isUser?C.limeFade:i<3?"rgba(255,184,0,.03)":C.surface,border:`1px solid ${r.isUser?C.lime:i<3?C.amberFade:C.edge}`,borderRadius:6,padding:"12px 16px",display:"flex",alignItems:"center",gap:14}}>
            <span style={{fontFamily:fd,fontSize:18,color:i===0?C.amber:i===1?"#C0C0C0":i===2?"#CD7F32":C.fog,width:24,textAlign:"center"}}>
              {i<3?["1","2","3"][i]:r.pos}
            </span>
            <div style={{width:32,height:32,borderRadius:4,background:r.isUser?C.lime:C.lift,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,color:r.isUser?"#000":C.ash,fontFamily:fd,flexShrink:0}}>
              {r.name[0]}
            </div>
            <div style={{flex:1}}>
              <p style={{fontWeight:600,fontSize:13,color:r.isUser?C.lime:C.snow}}>{r.name}{r.isUser?" — você":""}</p>
              <p style={{color:C.ash,fontSize:11}}>{r.streak}d de streak</p>
            </div>
            <div style={{textAlign:"right"}}>
              <p style={{fontFamily:fd,fontSize:20,color:i<3?C.amber:r.isUser?C.lime:C.snow}}>{r.xp.toLocaleString()}</p>
              <p style={{color:C.ash,fontSize:9,letterSpacing:1}}>XP</p>
            </div>
          </div>
        ))}
      </div>
      <div style={{marginTop:16,background:"rgba(129,140,248,.06)",border:"1px solid rgba(129,140,248,.2)",borderRadius:6,padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <p style={{color:C.violet,fontSize:13,fontWeight:600}}>Estude mais 55 questões hoje para subir uma posição</p>
        <button style={{background:C.violet,border:"none",color:"#fff",padding:"7px 16px",borderRadius:4,cursor:"pointer",fontFamily:ff,fontWeight:700,fontSize:12}}>Estudar →</button>
      </div>
    </div>
  );
}

/* ─── SPIN MODAL ─────────────────────────────────────────────────── */
function SpinModal({onClose,addXP,addCoins}){
  const [spinning,setSpinning]=useState(false);
  const [prize,setPrize]=useState(null);
  const [deg,setDeg]=useState(0);

  const spin=()=>{
    if(spinning||prize)return;
    setSpinning(true);
    const extra=720+Math.random()*360;
    setDeg(d=>d+extra);
    const idx=Math.floor(Math.random()*SPIN_PRIZES.length);
    setTimeout(()=>{
      setPrize(SPIN_PRIZES[idx]);
      setSpinning(false);
      if(idx===0)addXP(50);
      if(idx===1)addXP(100);
      if(idx===2)addCoins(20);
      if(idx===3)addCoins(50);
    },2800);
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.92)",backdropFilter:"blur(16px)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={prize?onClose:undefined}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.ink,border:`1px solid ${C.edge}`,borderRadius:12,padding:36,maxWidth:380,width:"100%",textAlign:"center"}}>
        <p style={{color:C.ash,fontSize:10,letterSpacing:3,textTransform:"uppercase",marginBottom:8}}>Recompensa diária</p>
        <h2 style={{fontFamily:fd,fontSize:32,marginBottom:24}}>ROLETA <span style={{color:C.violet}}>DE PRÊMIOS</span></h2>

        <div style={{position:"relative",width:200,height:200,margin:"0 auto 24px"}}>
          <div style={{position:"absolute",top:"-12px",left:"50%",transform:"translateX(-50%)",zIndex:10,color:C.violet,fontSize:20}}>▼</div>
          <div style={{width:"100%",height:"100%",borderRadius:"50%",background:`conic-gradient(${SPIN_COLORS.map((c,i)=>`${c} ${i/SPIN_COLORS.length*360}deg ${(i+1)/SPIN_COLORS.length*360}deg`).join(",")})`,transform:`rotate(${deg}deg)`,transition:spinning?"transform 2.8s cubic-bezier(.17,.67,.12,.99)":"none",border:`3px solid ${C.edge}`}}/>
          <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:36,height:36,borderRadius:"50%",background:C.ink,border:`2px solid ${C.edge}`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:fd,fontSize:14,zIndex:5}}>E</div>
        </div>

        {prize?(
          <div style={{background:"rgba(129,140,248,.07)",border:"1px solid rgba(129,140,248,.25)",borderRadius:8,padding:18,marginBottom:18}}>
            <p style={{fontFamily:fd,fontSize:14,color:C.ash,letterSpacing:2,marginBottom:6}}>VOCÊ GANHOU</p>
            <p style={{fontFamily:fd,fontSize:36,color:C.violet}}>{prize}</p>
          </div>
        ):(
          <div style={{background:C.surface,border:`1px solid ${C.edge}`,borderRadius:6,padding:10,marginBottom:16}}>
            <p style={{color:C.ash,fontSize:10,marginBottom:6,letterSpacing:1}}>PRÊMIOS POSSÍVEIS</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:5,justifyContent:"center"}}>
              {SPIN_PRIZES.map((p,i)=>(
                <span key={p} style={{background:C.ink,border:`1px solid ${C.edge}`,borderRadius:3,padding:"3px 8px",fontSize:10,color:SPIN_COLORS[i],fontWeight:700}}>{p}</span>
              ))}
            </div>
          </div>
        )}

        {!prize&&<button onClick={spin} disabled={spinning} style={{width:"100%",background:spinning?C.surface:C.violet,border:"none",color:"#fff",padding:"12px",borderRadius:6,cursor:spinning?"default":"pointer",fontFamily:ff,fontWeight:800,fontSize:15,marginBottom:10}}>
          {spinning?"Girando...":"Girar agora"}
        </button>}
        <button onClick={onClose} style={{background:"transparent",border:`1px solid ${C.edge}`,color:C.ash,padding:"8px 20px",borderRadius:5,cursor:"pointer",fontFamily:ff,fontSize:12}}>
          {prize?"Fechar":"Cancelar"}
        </button>
      </div>
    </div>
  );
}

/* ─── CHECKOUT ───────────────────────────────────────────────────── */
function Checkout({plan,go}){
  const [method,setMethod]=useState("pix");
  const [success,setSuccess]=useState(false);
  const [loading,setLoading]=useState(false);
  const pay=()=>{setLoading(true);setTimeout(()=>{setLoading(false);setSuccess(true);},1800);};
  const inp={width:"100%",background:C.surface,border:`1px solid ${C.edge}`,borderRadius:6,padding:"11px 14px",color:C.snow,fontFamily:ff,fontSize:14};

  if(!plan)return null;

  if(success)return(
    <div style={{maxWidth:420,margin:"0 auto",padding:"80px 28px",textAlign:"center"}}>
      <div style={{width:64,height:64,borderRadius:10,background:C.lime,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 20px"}}>✓</div>
      <h1 style={{fontFamily:fd,fontSize:44,color:C.lime,marginBottom:10}}>PAGAMENTO APROVADO</h1>
      <p style={{color:C.ash,marginBottom:28,fontSize:14,lineHeight:1.7}}>Plano <strong style={{color:C.snow}}>{plan.label}</strong> ativado. Verifique seu e-mail com os dados de acesso.</p>
      <button onClick={()=>go("dashboard")} style={{background:C.lime,border:"none",color:"#000",padding:"12px 28px",borderRadius:6,cursor:"pointer",fontFamily:ff,fontWeight:800,fontSize:15}}>Acessar dashboard →</button>
    </div>
  );

  return(
    <div style={{maxWidth:520,margin:"0 auto",padding:"40px 28px"}}>
      <button onClick={()=>go("landing")} style={{background:"transparent",border:"none",color:C.ash,cursor:"pointer",fontFamily:ff,marginBottom:20,fontSize:13}}>← Voltar</button>
      <p style={{color:C.ash,fontSize:10,letterSpacing:3,textTransform:"uppercase",marginBottom:8}}>Finalizar compra</p>
      <h1 style={{fontFamily:fd,fontSize:44,marginBottom:20}}>CHECKOUT</h1>

      {/* Plan summary */}
      <div style={{background:C.surface,border:`1px solid ${plan.hi?C.lime:C.edge}`,borderRadius:8,padding:18,marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <p style={{fontWeight:700,fontSize:16}}>{plan.label}</p>
            <p style={{color:C.ash,fontSize:12,marginTop:2}}>ENEMPro · Acesso completo</p>
          </div>
          <div style={{textAlign:"right"}}>
            <p style={{fontFamily:fd,fontSize:38,color:C.lime}}>R${plan.price}</p>
            <p style={{color:C.ash,fontSize:11}}>{plan.period}</p>
          </div>
        </div>
        <div style={{borderTop:`1px solid ${C.edge}`,marginTop:12,paddingTop:12,display:"flex",gap:16,flexWrap:"wrap"}}>
          {["Garantia 7 dias","Acesso imediato","Cancele quando quiser"].map(t=>(
            <span key={t} style={{color:C.lime,fontSize:11,fontWeight:600}}>↳ {t}</span>
          ))}
        </div>
      </div>

      {/* Method toggle */}
      <div style={{display:"flex",gap:6,marginBottom:18}}>
        {[["pix","PIX"],["card","Cartão"]].map(([m,l])=>(
          <button key={m} onClick={()=>setMethod(m)} style={{flex:1,background:method===m?C.limeFade:"transparent",border:`1px solid ${method===m?C.lime:C.edge}`,color:method===m?C.lime:C.ash,padding:"9px",borderRadius:6,cursor:"pointer",fontFamily:ff,fontWeight:700,fontSize:13}}>
            {l}
          </button>
        ))}
      </div>

      {method==="pix"?(
        <div style={{background:C.surface,border:`1px solid ${C.edge}`,borderRadius:8,padding:22,textAlign:"center"}}>
          <div style={{width:140,height:140,background:C.ink,border:`1px solid ${C.edge}`,borderRadius:8,margin:"0 auto 14px",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <p style={{color:C.ash,fontSize:11,lineHeight:1.6}}>QR Code PIX<br/>via seu gateway</p>
          </div>
          <div style={{background:C.ink,border:`1px solid ${C.edge}`,borderRadius:4,padding:"8px 12px",fontFamily:"monospace",fontSize:10,color:C.ash,marginBottom:18,wordBreak:"break-all",textAlign:"left"}}>
            00020126580014br.gov.bcb.pix0136[SEU-GATEWAY]
          </div>
          <button onClick={pay} disabled={loading} style={{background:loading?C.surface:C.lime,border:"none",color:"#000",padding:"12px",borderRadius:6,cursor:loading?"wait":"pointer",fontFamily:ff,fontWeight:800,fontSize:14,width:"100%"}}>
            {loading?"Confirmando...":"Confirmar PIX"}
          </button>
        </div>
      ):(
        <div style={{background:C.surface,border:`1px solid ${C.edge}`,borderRadius:8,padding:22}}>
          {[["Número do cartão","0000 0000 0000 0000"],["Nome no cartão","NOME COMPLETO"]].map(([l,ph])=>(
            <div key={l} style={{marginBottom:12}}>
              <label style={{color:C.ash,fontSize:10,fontWeight:700,letterSpacing:1,display:"block",marginBottom:5}}>{l.toUpperCase()}</label>
              <input style={inp} placeholder={ph}/>
            </div>
          ))}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
            {[["Validade","12/28"],["CVV","•••"]].map(([l,ph])=>(
              <div key={l}><label style={{color:C.ash,fontSize:10,fontWeight:700,letterSpacing:1,display:"block",marginBottom:5}}>{l.toUpperCase()}</label><input style={inp} placeholder={ph}/></div>
            ))}
          </div>
          <button onClick={pay} disabled={loading} style={{width:"100%",background:loading?C.surface:C.lime,border:"none",color:"#000",padding:"12px",borderRadius:6,cursor:loading?"wait":"pointer",fontFamily:ff,fontWeight:800,fontSize:14}}>
            {loading?"Processando...":` Pagar R$${plan.price}${plan.period}`}
          </button>
        </div>
      )}
      <p style={{color:C.fog,fontSize:10,textAlign:"center",marginTop:12}}>SSL · PCI DSS · Dados criptografados</p>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
